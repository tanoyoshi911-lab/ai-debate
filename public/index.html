<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI議論アリーナ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
    header { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 18px; font-weight: 600; }
    header .badge { font-size: 11px; background: #f0effe; color: #5346b7; padding: 3px 8px; border-radius: 99px; font-weight: 500; }
    .container { max-width: 720px; margin: 0 auto; padding: 1.5rem; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e0; padding: 1.25rem; margin-bottom: 1rem; }
    .card h2 { font-size: 14px; font-weight: 600; color: #555; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
    label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; margin-top: 12px; }
    label:first-of-type { margin-top: 0; }
    input[type="password"], input[type="text"], textarea, select { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; background: #fafafa; color: #1a1a1a; transition: border 0.15s; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #7f77dd; background: #fff; }
    textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
    .row { display: flex; gap: 12px; align-items: flex-end; }
    .row > div { flex: 1; }
    select { cursor: pointer; }
    .toggle-btn { background: none; border: none; font-size: 12px; color: #888; cursor: pointer; padding: 4px 0; text-decoration: underline; }
    .start-btn { width: 100%; padding: 12px; margin-top: 1rem; background: #5346b7; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .start-btn:hover { background: #4338a0; }
    .start-btn:disabled { background: #aaa; cursor: not-allowed; }
    .error { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 10px; }
    #chatSection { display: none; }
    .chat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .chat-header h2 { font-size: 16px; font-weight: 600; }
    .reset-btn { font-size: 13px; color: #888; background: none; border: 1px solid #ddd; border-radius: 6px; padding: 5px 12px; cursor: pointer; }
    .reset-btn:hover { border-color: #aaa; }
    .messages { display: flex; flex-direction: column; gap: 14px; }
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.gpt { flex-direction: row-reverse; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .avatar.claude { background: #eeedfe; color: #3c3489; }
    .avatar.gpt { background: #dcfce7; color: #166534; }
    .msg-body { max-width: 80%; }
    .speaker { font-size: 11px; color: #999; margin-bottom: 4px; }
    .msg.gpt .speaker { text-align: right; }
    .bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.7; border: 1px solid #e5e5e0; }
    .bubble.claude { background: #fff; border-radius: 4px 12px 12px 12px; }
    .bubble.gpt { background: #f0fdf4; border-radius: 12px 4px 12px 12px; }
    .thinking { display: flex; align-items: center; gap: 5px; padding: 10px 14px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #bbb; animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }
    .divider { border: none; border-top: 1px dashed #e5e5e0; margin: 4px 0; }
    .status { text-align: center; font-size: 13px; color: #999; padding: 8px 0; }
    .legend { display: flex; gap: 16px; font-size: 12px; color: #888; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .legend-dot.claude { background: #7f77dd; }
    .legend-dot.gpt { background: #4ade80; }
  </style>
</head>
<body>
<header>
  <h1>🤖 AI議論アリーナ</h1>
  <span class="badge">Claude × ChatGPT</span>
</header>
<div class="container">
  <div id="setupSection">
    <div class="card">
      <h2>APIキー設定</h2>
      <label>Anthropic APIキー（Claude用）</label>
      <input type="password" id="anthropicKey" placeholder="sk-ant-..." />
      <button class="toggle-btn" onclick="toggleVis('anthropicKey')">表示/非表示</button>
      <label style="margin-top:14px;">OpenAI APIキー（ChatGPT用）</label>
      <input type="password" id="openaiKey" placeholder="sk-proj-..." />
      <button class="toggle-btn" onclick="toggleVis('openaiKey')">表示/非表示</button>
    </div>
    <div class="card">
      <h2>議論設定</h2>
      <label>議論テーマ</label>
      <textarea id="topic" placeholder="例：AIは人間の創造性を超えることができるか？"></textarea>
      <div class="row" style="margin-top:12px;">
        <div>
          <label>発言回数（各AI）</label>
          <select id="turns">
            <option value="2">2回ずつ</option>
            <option value="3" selected>3回ずつ</option>
            <option value="4">4回ずつ</option>
          </select>
        </div>
        <div>
          <label>応答の長さ</label>
          <select id="length">
            <option value="short">短め（100字）</option>
            <option value="medium" selected>普通（200字）</option>
            <option value="long">長め（400字）</option>
          </select>
        </div>
      </div>
      <button class="start-btn" id="startBtn" onclick="startDebate()">議論を開始する</button>
      <div id="errorMsg"></div>
    </div>
  </div>
  <div id="chatSection">
    <div class="chat-header">
      <div>
        <h2 id="topicTitle"></h2>
        <div class="legend" style="margin-top:6px;">
          <div class="legend-item"><div class="legend-dot claude"></div>Claude</div>
          <div class="legend-item"><div class="legend-dot gpt"></div>ChatGPT</div>
        </div>
      </div>
      <button class="reset-btn" onclick="resetDebate()">← 最初に戻る</button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="status" id="statusMsg"></div>
  </div>
</div>
<script>
function toggleVis(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}
function showError(msg) {
  document.getElementById('errorMsg').innerHTML = '<div class="error">' + msg + '</div>';
}
function clearError() {
  document.getElementById('errorMsg').innerHTML = '';
}
function addMsg(speaker, text, thinking) {
  const area = document.getElementById('messages');
  const isClaude = speaker === 'Claude';
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (isClaude ? 'claude' : 'gpt');
  if (thinking) {
    wrap.id = 'thinking';
    wrap.innerHTML = '<div class="avatar ' + (isClaude ? 'claude' : 'gpt') + '">' + (isClaude ? 'C' : 'G') + '</div><div class="msg-body"><div class="speaker">' + speaker + '</div><div class="bubble ' + (isClaude ? 'claude' : 'gpt') + ' thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  } else {
    wrap.innerHTML = '<div class="avatar ' + (isClaude ? 'claude' : 'gpt') + '">' + (isClaude ? 'C' : 'G') + '</div><div class="msg-body"><div class="speaker">' + speaker + '</div><div class="bubble ' + (isClaude ? 'claude' : 'gpt') + '">' + text.replace(/\n/g, '<br>') + '</div></div>';
  }
  area.appendChild(wrap);
  wrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
}
function removeThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}
function setStatus(msg) {
  document.getElementById('statusMsg').textContent = msg;
}
function addDivider() {
  const el = document.createElement('hr');
  el.className = 'divider';
  document.getElementById('messages').appendChild(el);
}
var lengthMap = { short: 100, medium: 200, long: 400 };
async function callClaude(anthropicKey, messages) {
  const res = await fetch('/api/claude', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ apiKey: anthropicKey, messages: messages }) });
  if (!res.ok) { const e = await res.json().catch(function(){ return {}; }); throw new Error(e.error || 'Claude API error: ' + res.status); }
  const data = await res.json();
  return data.content;
}
async function callGPT(openaiKey, messages, system) {
  const res = await fetch('/api/openai', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ apiKey: openaiKey, messages: messages, system: system }) });
  if (!res.ok) { const e = await res.json().catch(function(){ return {}; }); throw new Error(e.error || 'OpenAI API error: ' + res.status); }
  const data = await res.json();
  return data.content;
}
async function startDebate() {
  clearError();
  const anthropicKey = document.getElementById('anthropicKey').value.trim();
  const openaiKey = document.getElementById('openaiKey').value.trim();
  const topic = document.getElementById('topic').value.trim();
  const turns = parseInt(document.getElementById('turns').value);
  const chars = lengthMap[document.getElementById('length').value];
  if (!anthropicKey) { showError('Anthropic APIキーを入力してください'); return; }
  if (!openaiKey) { showError('OpenAI APIキーを入力してください'); return; }
  if (!topic) { showError('議論テーマを入力してください'); return; }
  document.getElementById('startBtn').disabled = true;
  document.getElementById('setupSection').style.display = 'none';
  document.getElementById('chatSection').style.display = 'block';
  document.getElementById('topicTitle').textContent = '「' + topic + '」';
  document.getElementById('messages').innerHTML = '';
  const claudeSystem = 'あなたはClaudeです。与えられたテーマについてChatGPTと議論しています。相手の意見を踏まえ、自分の立場から論理的かつ簡潔に（' + chars + '字程度）意見を述べてください。日本語で返答してください。';
  const gptSystem = 'あなたはChatGPTです。与えられたテーマについてClaudeと議論しています。相手の意見を踏まえ、自分の立場から論理的かつ簡潔に（' + chars + '字程度）意見を述べてください。日本語で返答してください。';
  const claudeMessages = [{ role: 'user', content: 'テーマ：「' + topic + '」\nこのテーマについて、まず最初の意見を述べてください。' }];
  const gptMessages = [];
  try {
    for (let i = 0; i < turns; i++) {
      setStatus('Claude が考えています... (' + (i+1) + '/' + turns + ')');
      addMsg('Claude', '', true);
      const claudeReply = await callClaude(anthropicKey, claudeMessages);
      removeThinking();
      addMsg('Claude', claudeReply);
      claudeMessages.push({ role: 'assistant', content: claudeReply });
      const gptPrompt = i === 0 ? 'テーマ：「' + topic + '」\nClaudeの意見：' + claudeReply + '\n\nこれに対して、あなたの立場から意見を述べてください。' : 'Claudeの発言：' + claudeReply + '\n\n反論または応答してください。';
      gptMessages.push({ role: 'user', content: gptPrompt });
      setStatus('ChatGPT が考えています... (' + (i+1) + '/' + turns + ')');
      addMsg('ChatGPT', '', true);
      const gptReply = await callGPT(openaiKey, gptMessages, gptSystem);
      removeThinking();
      addMsg('ChatGPT', gptReply);
      gptMessages.push({ role: 'assistant', content: gptReply });
      claudeMessages.push({ role: 'user', content: 'ChatGPTの発言：' + gptReply + '\n\nこれに反論または応答してください。' });
      if (i < turns - 1) addDivider();
    }
    setStatus('議論終了');
  } catch(e) {
    removeThinking();
    document.getElementById('setupSection').style.display = 'block';
    document.getElementById('chatSection').style.display = 'none';
    document.getElementById('startBtn').disabled = false;
    showError(e.message);
  }
}
function resetDebate() {
  document.getElementById('setupSection').style.display = 'block';
  document.getElementById('chatSection').style.display = 'none';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('messages').innerHTML = '';
  setStatus('');
}
</script>
</body>
</html>
